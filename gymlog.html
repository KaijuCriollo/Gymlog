<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#E24B4A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="GymLog"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>GymLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5f4f1;font-family:'DM Sans',sans-serif;color:#1a1a18;overflow:hidden}

:root{
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --bg:#f5f4f1;--surface:#ffffff;--border:#e8e6e0;
  --text:#1a1a18;--muted:#7a7870;--subtle:#b4b2a9;
  --radius:14px;--radius-sm:10px;
}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg)}
.header{padding:env(safe-area-inset-top,0) 0 0;background:var(--surface);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px}
.app-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--text)}
.app-title span{color:var(--red)}
.streak-badge{background:var(--red-light);color:var(--red-dark);font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px}
.date-sub{font-size:12px;color:var(--muted);padding:0 16px 10px;font-family:'DM Mono',monospace}

/* NAV */
.nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--subtle);font-family:'DM Sans',sans-serif;font-size:11px;transition:color 0.15s;position:relative}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--red)}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--red);border-radius:2px 2px 0 0}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,16px)}
.tab{display:none;padding:0 0 80px}
.tab.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:12px 12px 0}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;user-select:none}
.card-header-left{flex:1;min-width:0}
.ex-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-muscle{font-size:12px;color:var(--muted);margin-top:2px}
.card-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-pill{background:var(--red-light);color:var(--red-dark);font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.chevron{width:18px;height:18px;stroke:var(--subtle);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.card-body.open{display:block}

/* SERIES TABLE */
.col-labels{display:grid;grid-template-columns:24px 1fr 1fr 36px;gap:8px;margin-bottom:6px;font-size:11px;color:var(--subtle);padding:0 2px}
.series-row{display:grid;grid-template-columns:24px 1fr 1fr 36px;gap:8px;align-items:center;margin-bottom:7px}
.series-num{font-size:12px;color:var(--subtle);text-align:center;font-family:'DM Mono',monospace}
.num-input{width:100%;padding:8px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Mono',monospace;text-align:center;background:#fafaf8;color:var(--text);outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.num-input:focus{border-color:var(--red)}
.check-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0}
.check-btn svg{width:16px;height:16px;stroke:var(--subtle);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.check-btn.done{background:var(--red-light);border-color:var(--red)}
.check-btn.done svg{stroke:var(--red)}

/* EXERCISE NOTE */
.ex-note-wrap{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.ex-note-label{font-size:11px;color:var(--subtle);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.note-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;resize:none;outline:none;transition:border-color 0.15s;min-height:60px}
.note-textarea:focus{border-color:var(--red)}
.note-textarea::placeholder{color:var(--subtle)}

.add-series-btn{width:100%;margin-top:6px;padding:8px;background:none;border:1.5px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'DM Sans',sans-serif}
.del-btn{margin-top:8px;float:right;background:none;border:none;font-size:12px;color:var(--subtle);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:3px;padding:2px 0}
.del-btn:hover{color:var(--red)}
.clearfix::after{content:'';display:table;clear:both}

/* WORKOUT NOTE */
.workout-note-wrap{margin:12px 12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px}
.workout-note-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.workout-note-title svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.mood-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.mood-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.15s}
.mood-chip.selected{background:var(--red-light);border-color:var(--red);color:var(--red-dark);font-weight:500}
.workout-note-input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;resize:none;outline:none;transition:border-color 0.15s;min-height:72px}
.workout-note-input:focus{border-color:var(--red)}
.workout-note-input::placeholder{color:var(--subtle)}

/* ADD EXERCISE */
.add-ex-area{margin:12px 12px 0}
.add-ex-btn{width:100%;padding:13px;background:none;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
.add-ex-btn:hover{border-color:var(--red);color:var(--red)}

/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));background:rgba(245,244,241,0.9);backdrop-filter:blur(12px);border-top:1px solid var(--border)}
.save-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:-0.2px;transition:opacity 0.15s}
.save-btn:active{opacity:0.85}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:14px}
.field-label{font-size:12px;color:var(--muted);margin-bottom:5px}
.modal-input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;outline:none;margin-bottom:12px;transition:border-color 0.15s}
.modal-input:focus{border-color:var(--red)}
.modal-select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;outline:none;margin-bottom:16px;-webkit-appearance:none;appearance:none}
.modal-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:13px;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--muted)}
.btn-confirm{flex:2;padding:13px;background:var(--red);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:#fff;cursor:pointer}

/* HISTORY */
.hist-day{margin:12px 12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.hist-day-header{padding:12px 14px;background:#fafaf8;border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between}
.hist-day-date{font-size:13px;font-weight:600;color:var(--text)}
.hist-day-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.hist-ex-item{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.hist-ex-item:last-child{border-bottom:none}
.hist-ex-name{font-size:13px;font-weight:500;color:var(--text)}
.hist-ex-detail{font-size:12px;color:var(--muted);margin-top:2px}
.hist-ex-note{font-size:12px;color:var(--muted);margin-top:4px;font-style:italic}
.hist-kg{font-size:13px;font-weight:600;color:var(--red-dark);font-family:'DM Mono',monospace;white-space:nowrap}
.hist-workout-note{padding:10px 14px;background:var(--red-light);border-top:1px solid #f0c4c4;display:flex;align-items:flex-start;gap:8px}
.hist-workout-note-text{font-size:12px;color:var(--red-dark)}
.mood-tag{display:inline-block;background:var(--red-light);color:var(--red-dark);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-bottom:3px}

/* PROGRESS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 12px 0}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px}
.stat-box-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-box-val{font-size:24px;font-weight:600;color:var(--text);line-height:1;font-family:'DM Mono',monospace}
.stat-box-unit{font-size:13px;font-weight:400;color:var(--muted)}
.progress-ex-sel{display:block;width:calc(100% - 24px);margin:12px 12px 0;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);outline:none;-webkit-appearance:none;appearance:none}
.pr-banner{margin:10px 12px 0;background:var(--red-light);border:1px solid #f5c4c4;border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px}
.pr-trophy{font-size:28px;line-height:1}
.pr-info-label{font-size:11px;color:var(--red-dark)}
.pr-info-val{font-size:22px;font-weight:600;color:var(--red-dark);font-family:'DM Mono',monospace}
.chart-wrap{margin:12px 12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;height:220px}
.empty-state{text-align:center;padding:40px 20px;color:var(--subtle)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px;line-height:1.5}

/* FILTER PILLS */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding:10px 12px 0;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-pill{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.filter-pill.active{background:var(--red-light);border-color:var(--red);color:var(--red-dark)}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PWA install hint */
.install-hint{margin:12px 12px 0;background:#fff8e6;border:1px solid #f5d98a;border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:#7a6520;line-height:1.5;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.install-hint-close{background:none;border:none;font-size:16px;cursor:pointer;color:#7a6520;flex-shrink:0;padding:0;line-height:1}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="app-title">Gym<span>Log</span></div>
      <div class="streak-badge" id="streak-badge">🔥 0 días</div>
    </div>
    <div class="date-sub" id="date-sub">cargando...</div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('registro',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="12" y1="9" x2="12" y2="15"/></svg>
      Registrar
    </button>
    <button class="nav-btn" onclick="switchTab('historial',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      Historial
    </button>
    <button class="nav-btn" onclick="switchTab('progreso',this)">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progreso
    </button>
  </nav>

  <!-- CONTENT -->
  <div class="content">

    <!-- TAB REGISTRO -->
    <div id="tab-registro" class="tab active">
      <div id="install-hint" class="install-hint" style="display:none">
        <span>💡 <strong>Instalá la app:</strong> tocá el menú del navegador → <strong>"Agregar a pantalla de inicio"</strong></span>
        <button class="install-hint-close" onclick="document.getElementById('install-hint').style.display='none'">✕</button>
      </div>
      <div class="filter-row" id="muscle-filters"></div>
      <div id="exercises-list"></div>
      <div class="add-ex-area">
        <button class="add-ex-btn" onclick="openModal()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar ejercicio
        </button>
      </div>

      <!-- WORKOUT NOTE SECTION -->
      <div class="workout-note-wrap" style="margin-top:12px">
        <div class="workout-note-title">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Nota del entrenamiento
        </div>
        <div class="mood-row" id="mood-row"></div>
        <textarea class="workout-note-input" id="workout-note" placeholder="¿Cómo te sentiste hoy? Ej: «Sentí que podía haber dado más» o «Me costó mucho el calor»…" rows="3"></textarea>
      </div>

      <div style="height:80px"></div>
    </div>

    <!-- TAB HISTORIAL -->
    <div id="tab-historial" class="tab">
      <div id="history-list"></div>
    </div>

    <!-- TAB PROGRESO -->
    <div id="tab-progreso" class="tab">
      <div class="stats-grid" id="global-stats"></div>
      <select class="progress-ex-sel" id="progress-ex-sel" onchange="renderProgressChart()"></select>
      <div id="pr-banner"></div>
      <div class="chart-wrap"><canvas id="progressChart" role="img" aria-label="Evolución de peso máximo en el ejercicio seleccionado">Gráfico de progreso</canvas></div>
    </div>

  </div><!-- end content -->
</div><!-- end app -->

<!-- SAVE BAR (only visible on registro tab) -->
<div class="save-bar" id="save-bar">
  <button class="save-btn" onclick="saveWorkout()">💾 Guardar entrenamiento</button>
</div>

<!-- MODAL NUEVO EJERCICIO -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo ejercicio</div>
    <div class="field-label">Nombre</div>
    <input class="modal-input" id="ex-name-inp" type="text" placeholder="Ej: Press de banca" autocomplete="off"/>
    <div class="field-label">Grupo muscular</div>
    <select class="modal-select" id="ex-muscle-inp">
      <option value="Pecho">Pecho</option>
      <option value="Espalda">Espalda</option>
      <option value="Piernas">Piernas</option>
      <option value="Hombros">Hombros</option>
      <option value="Brazos">Brazos</option>
      <option value="Core">Core</option>
      <option value="Cardio">Cardio</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="addExercise()">Agregar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'gymlog_v3';
const MOODS = ['💪 Excelente','😊 Bien','😐 Regular','😓 Cansado','🤒 Me sentí mal'];
let state = { exercises:[], history:[], currentFilter:'Todos' };
let progressChart = null;

/* ── STORAGE ── */
function load(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) state=JSON.parse(r); }catch(e){}
  if(!state.exercises) state.exercises=[];
  if(!state.history) state.history=[];
  if(!state.currentFilter) state.currentFilter='Todos';
}
function save(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }

/* ── DEFAULTS ── */
function initDefaults(){
  if(state.exercises.length===0){
    state.exercises=[
      {id:1,name:'Press de banca',muscle:'Pecho',note:'',series:[{reps:'10',kg:'60',done:false},{reps:'8',kg:'65',done:false},{reps:'6',kg:'70',done:false}]},
      {id:2,name:'Sentadillas',muscle:'Piernas',note:'',series:[{reps:'10',kg:'80',done:false},{reps:'8',kg:'90',done:false}]},
      {id:3,name:'Dominadas',muscle:'Espalda',note:'',series:[{reps:'8',kg:'0',done:false},{reps:'6',kg:'0',done:false}]}
    ];
    save();
  }
}

/* ── TABS ── */
function switchTab(tab, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  document.getElementById('save-bar').style.display = tab==='registro' ? '' : 'none';
  if(tab==='historial') renderHistory();
  if(tab==='progreso') renderProgress();
}

/* ── FILTER ── */
const MUSCLES = ['Todos','Pecho','Espalda','Piernas','Hombros','Brazos','Core','Cardio'];
function renderFilters(){
  const row = document.getElementById('muscle-filters');
  row.innerHTML = MUSCLES.map(m=>
    `<div class="filter-pill ${m===state.currentFilter?'active':''}" onclick="setFilter('${m}',this)">${m}</div>`
  ).join('');
}
function setFilter(m, el){
  state.currentFilter=m;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderExercises();
}

/* ── EXERCISES ── */
function renderExercises(){
  const list = document.getElementById('exercises-list');
  const items = state.currentFilter==='Todos' ? state.exercises : state.exercises.filter(e=>e.muscle===state.currentFilter);
  if(!items.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-text">Sin ejercicios.<br>Tocá el botón para agregar uno.</div></div>`;
    return;
  }
  list.innerHTML = items.map(ex => {
    const done = ex.series.filter(s=>s.done).length;
    const total = ex.series.length;
    const pct = total>0?Math.round(done/total*100):0;
    const maxKg = ex.series.reduce((a,s)=>Math.max(a,parseFloat(s.kg)||0),0);
    return `<div class="card" id="card-${ex.id}">
      <div class="card-header" onclick="toggleCard(${ex.id})">
        <div class="card-header-left">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle} · ${maxKg>0?maxKg+'kg max':'peso corporal'}</div>
        </div>
        <div class="card-header-right">
          <div class="prog-pill">${done}/${total}</div>
          <svg class="chevron" id="chev-${ex.id}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body" id="body-${ex.id}">
        <div class="col-labels"><span>#</span><span>Reps</span><span>Peso kg</span><span></span></div>
        ${ex.series.map((s,i)=>`
          <div class="series-row">
            <span class="series-num">${i+1}</span>
            <input class="num-input" type="number" inputmode="decimal" value="${s.reps}" min="1"
              onchange="updateSeries(${ex.id},${i},'reps',this.value)" placeholder="Reps"/>
            <input class="num-input" type="number" inputmode="decimal" value="${s.kg}" min="0" step="0.5"
              onchange="updateSeries(${ex.id},${i},'kg',this.value)" placeholder="kg"/>
            <button class="check-btn ${s.done?'done':''}" onclick="toggleDone(${ex.id},${i})" aria-label="Marcar serie">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </div>`).join('')}
        <button class="add-series-btn" onclick="addSeries(${ex.id})">+ Agregar serie</button>
        <div class="ex-note-wrap">
          <div class="ex-note-label">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Nota del ejercicio (opcional)
          </div>
          <textarea class="note-textarea" placeholder="Ej: «Subí el peso», «Me costó la última serie»…"
            onchange="updateExNote(${ex.id},this.value)">${ex.note||''}</textarea>
        </div>
        <div class="clearfix">
          <button class="del-btn" onclick="deleteEx(${ex.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Eliminar
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.classList.toggle('open');
  if(open) chev.classList.add('open'); else chev.classList.remove('open');
}
function updateSeries(exId,idx,field,val){
  const ex=state.exercises.find(e=>e.id===exId);
  if(ex&&ex.series[idx]){ ex.series[idx][field]=val; save(); }
}
function toggleDone(exId,idx){
  const ex=state.exercises.find(e=>e.id===exId);
  if(ex&&ex.series[idx]){ ex.series[idx].done=!ex.series[idx].done; save(); renderExercises();
    const body=document.getElementById('body-'+exId);
    if(body){ body.classList.add('open'); document.getElementById('chev-'+exId).classList.add('open'); }
  }
}
function addSeries(id){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  const last=ex.series[ex.series.length-1];
  ex.series.push({reps:last?last.reps:'10',kg:last?last.kg:'0',done:false});
  save(); renderExercises();
  const body=document.getElementById('body-'+id);
  if(body){ body.classList.add('open'); document.getElementById('chev-'+id).classList.add('open'); }
}
function updateExNote(id,val){
  const ex=state.exercises.find(e=>e.id===id);
  if(ex){ ex.note=val; save(); }
}
function deleteEx(id){
  if(!confirm('¿Eliminar este ejercicio?')) return;
  state.exercises=state.exercises.filter(e=>e.id!==id);
  save(); renderExercises();
}

/* ── MODAL ── */
function openModal(){
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('ex-name-inp').value='';
  setTimeout(()=>document.getElementById('ex-name-inp').focus(),100);
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function addExercise(){
  const name=document.getElementById('ex-name-inp').value.trim();
  if(!name){ document.getElementById('ex-name-inp').focus(); return; }
  const muscle=document.getElementById('ex-muscle-inp').value;
  state.exercises.push({id:Date.now(),name,muscle,note:'',series:[{reps:'10',kg:'0',done:false}]});
  save(); closeModal(); renderExercises();
  showToast('Ejercicio agregado ✓');
}
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

/* ── MOODS ── */
function renderMoods(){
  const row=document.getElementById('mood-row');
  row.innerHTML=MOODS.map(m=>
    `<button class="mood-chip ${state.currentMood===m?'selected':''}" onclick="selectMood('${m}',this)">${m}</button>`
  ).join('');
}
function selectMood(m,el){
  state.currentMood=m;
  document.querySelectorAll('.mood-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}

/* ── SAVE WORKOUT ── */
function saveWorkout(){
  const doneAny=state.exercises.some(e=>e.series.some(s=>s.done));
  if(!doneAny){ showToast('¡Marcá al menos una serie! ✓'); return; }
  const noteVal=document.getElementById('workout-note').value.trim();
  const entry={
    date:new Date().toISOString(),
    mood:state.currentMood||null,
    note:noteVal||null,
    exercises:state.exercises.filter(e=>e.series.some(s=>s.done)).map(ex=>({
      name:ex.name, muscle:ex.muscle, note:ex.note||null,
      series:ex.series.filter(s=>s.done).map(s=>({reps:parseInt(s.reps)||0,kg:parseFloat(s.kg)||0}))
    }))
  };
  state.history.unshift(entry);
  state.exercises.forEach(ex=>{ ex.series.forEach(s=>s.done=false); ex.note=''; });
  state.currentMood=null;
  save();
  renderExercises(); renderMoods();
  document.getElementById('workout-note').value='';
  calcStreak();
  showToast('¡Entrenamiento guardado! 💪');
}

/* ── HISTORY ── */
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!state.history.length){
    list.innerHTML=`<div class="empty-state" style="padding-top:60px"><div class="empty-icon">📋</div><div class="empty-text">Todavía no guardaste<br>ningún entrenamiento.</div></div>`;
    return;
  }
  list.innerHTML=state.history.map(entry=>{
    const d=new Date(entry.date);
    const dateStr=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
    const timeStr=d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    const totalSeries=entry.exercises.reduce((a,e)=>a+e.series.length,0);
    const totalVol=entry.exercises.reduce((a,e)=>a+e.series.reduce((b,s)=>b+(s.reps*s.kg),0),0);
    const exItems=entry.exercises.map(ex=>{
      const maxKg=Math.max(...ex.series.map(s=>s.kg),0);
      return `<div class="hist-ex-item">
        <div>
          <div class="hist-ex-name">${ex.name}</div>
          <div class="hist-ex-detail">${ex.series.length} series${maxKg>0?' · '+maxKg+'kg max':''}</div>
          ${ex.note?`<div class="hist-ex-note">✏️ ${ex.note}</div>`:''}
        </div>
        <div class="hist-kg">${maxKg>0?maxKg+'kg':'BW'}</div>
      </div>`;
    }).join('');
    const noteBlock=(entry.mood||entry.note)?`<div class="hist-workout-note">
      <div>
        ${entry.mood?`<div class="mood-tag">${entry.mood}</div>`:''}
        ${entry.note?`<div class="hist-workout-note-text">"${entry.note}"</div>`:''}
      </div>
    </div>`:'';
    return `<div class="hist-day">
      <div class="hist-day-header">
        <div class="hist-day-date">${dateStr} · ${timeStr}</div>
        <div class="hist-day-meta">${totalSeries} series · ${Math.round(totalVol)}kg vol</div>
      </div>
      ${exItems}
      ${noteBlock}
    </div>`;
  }).join('');
}

/* ── PROGRESS ── */
function renderProgress(){
  const exNames=[...new Set(state.history.flatMap(h=>h.exercises.map(e=>e.name)))];
  const sel=document.getElementById('progress-ex-sel');
  const prev=sel.value;
  sel.innerHTML=exNames.length?exNames.map(n=>`<option>${n}</option>`):'<option>Sin datos</option>';
  if(prev&&exNames.includes(prev)) sel.value=prev;

  const totalW=state.history.length;
  const totalS=state.history.reduce((a,h)=>a+h.exercises.reduce((b,e)=>b+e.series.length,0),0);
  const totalKg=state.history.reduce((a,h)=>a+h.exercises.reduce((b,e)=>b+e.series.reduce((c,s)=>c+(s.reps*s.kg),0),0),0);
  const streak=calcStreak();
  document.getElementById('global-stats').innerHTML=`
    <div class="stat-box"><div class="stat-box-label">Entrenamientos</div><div class="stat-box-val">${totalW}</div></div>
    <div class="stat-box"><div class="stat-box-label">Series totales</div><div class="stat-box-val">${totalS}</div></div>
    <div class="stat-box"><div class="stat-box-label">Volumen total</div><div class="stat-box-val">${Math.round(totalKg)}<span class="stat-box-unit">kg</span></div></div>
    <div class="stat-box"><div class="stat-box-label">Racha</div><div class="stat-box-val">${streak}<span class="stat-box-unit"> días</span></div></div>
  `;
  renderProgressChart();
}

function renderProgressChart(){
  const exName=document.getElementById('progress-ex-sel').value;
  const banner=document.getElementById('pr-banner');
  if(!exName||!state.history.length){ banner.innerHTML=''; return; }
  const sessions=state.history
    .filter(h=>h.exercises.some(e=>e.name===exName))
    .map(h=>{ const ex=h.exercises.find(e=>e.name===exName); return {date:new Date(h.date),kg:Math.max(...ex.series.map(s=>s.kg),0)}; })
    .sort((a,b)=>a.date-b.date);
  if(!sessions.length){ banner.innerHTML=''; return; }
  const pr=Math.max(...sessions.map(s=>s.kg));
  banner.innerHTML=`<div class="pr-banner"><div class="pr-trophy">🏆</div><div><div class="pr-info-label">Récord personal · ${exName}</div><div class="pr-info-val">${pr}kg</div></div></div>`;
  const labels=sessions.map(s=>s.date.toLocaleDateString('es-AR',{day:'numeric',month:'short'}));
  const data=sessions.map(s=>s.kg);
  if(progressChart){ progressChart.destroy(); progressChart=null; }
  progressChart=new Chart(document.getElementById('progressChart'),{
    type:'line',
    data:{ labels, datasets:[{ label:exName, data, borderColor:'#E24B4A', backgroundColor:'rgba(226,75,74,0.08)', pointBackgroundColor:'#E24B4A', pointRadius:5, tension:0.35, fill:true }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ticks:{font:{size:11},color:'#7a7870',maxRotation:30},grid:{display:false}},
        y:{ticks:{font:{size:11},color:'#7a7870',callback:v=>v+'kg'},grid:{color:'rgba(0,0,0,0.05)'}}
      }
    }
  });
}

/* ── STREAK ── */
function calcStreak(){
  if(!state.history.length){ updateStreakBadge(0); return 0; }
  const dates=[...new Set(state.history.map(h=>new Date(h.date).toDateString()))].sort((a,b)=>new Date(b)-new Date(a));
  let streak=0, prev=new Date();
  for(let d of dates){
    const cur=new Date(d);
    const diff=Math.round((prev-cur)/(1000*60*60*24));
    if(diff<=1){ streak++; prev=cur; } else break;
  }
  updateStreakBadge(streak); return streak;
}
function updateStreakBadge(n){ document.getElementById('streak-badge').textContent=`🔥 ${n} día${n===1?'':'s'}`; }

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── DATE ── */
function setDate(){
  const d=new Date();
  document.getElementById('date-sub').textContent=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

/* ── PWA install hint ── */
function checkInstallHint(){
  const shown=localStorage.getItem('gymlog_hint_closed');
  const isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone;
  if(!isStandalone&&!shown){
    document.getElementById('install-hint').style.display='flex';
  }
}
document.getElementById('install-hint') && document.querySelector('.install-hint-close') &&
  document.querySelector('.install-hint-close').addEventListener('click',()=>{
    localStorage.setItem('gymlog_hint_closed','1');
  });

/* ── INIT ── */
load();
initDefaults();
setDate();
calcStreak();
renderFilters();
renderExercises();
renderMoods();
checkInstallHint();
</script>
